l_russian:
 DZG_first_vozhd_of_the_beaver_host: "Первый вождь войска бобриного"
 DZG_first_vozhd_of_the_beaver_host_desc: "Александр-Курва превратил речные отряды кооператоров в фанатичную силу, способную держаться даже в полном окружении. Но культ личности уже мешает спокойному управлению: каждый приказ вождя звучит как откровение, даже когда это просто правка карты каналов."
 DZG_partisan_movement: "Партизанское движение"
 DZG_partisan_movement_desc: "Вооружённые кооперации, портовые рабочие и речные караулы знают местность лучше любой регулярной армии. Они умеют защищать склады, леса, мосты и переправы, но такая война держится на нервном обществе и перегруженном снабжении."
 DZG_failed_army: "Несостоятельная армия"
 DZG_failed_army_desc: "У Данцига есть фанатики, инженеры и караулы, но полноценной армии пока нет. Командование спорит с кооперациями, обучение идёт рывками, а регулярные части слишком часто выглядят как стройбригада, которой выдали винтовки."
 DZG_cult_of_the_great_dam: "Культ Великой Плотины"
 DZG_cult_of_the_great_dam_desc: "Великая Плотина стала главным символом автономии: обещанием порядка, труда и контроля над хаосом воды. Она ускоряет стройки и укрепляет волю режима, но отвлекает ресурсы от военной промышленности и требует всё новых жертв от экономики."
